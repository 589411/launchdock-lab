<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launchdock Lab｜藍鴨 AI 實例庫</title>
<meta name="description" content="藍鴨 Launchdock 課堂實際案例庫:從提示詞到自動化工作流的可動手 demo。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EDF1F5; --ink:#14304A; --ink-soft:#3D5A77; --line:#C9D5E0;
  --amber:#F2A93B; --amber-deep:#C77E12; --card:#FFFFFF;
  --r:14px; --shadow:0 1px 2px rgba(20,48,74,.06),0 8px 24px rgba(20,48,74,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);line-height:1.65}
a{color:inherit}

header{max-width:1180px;margin:0 auto;padding:56px 24px 8px}
.eyebrow{font-family:'Space Grotesk';font-weight:700;letter-spacing:.18em;font-size:13px;color:var(--amber-deep);text-transform:uppercase}
h1{font-weight:900;font-size:clamp(30px,5vw,48px);letter-spacing:-.01em;margin:6px 0 10px}
h1 em{font-style:normal;border-bottom:6px solid var(--amber)}
.sub{color:var(--ink-soft);max-width:46em}
.stats{font-family:'Space Grotesk';font-size:13px;color:var(--ink-soft);margin-top:14px}

nav.filters{max-width:1180px;margin:22px auto 0;padding:0 24px;display:flex;flex-wrap:wrap;gap:8px}
.f{font:inherit;font-size:14px;font-weight:500;padding:7px 16px;border-radius:999px;border:1px solid var(--line);background:var(--card);cursor:pointer;transition:.15s}
.f:hover{border-color:var(--ink)}
.f.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.lv-filter{margin-left:auto;display:flex;gap:8px}

main{max-width:1180px;margin:26px auto 80px;padding:0 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:22px}
.card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;transition:transform .15s}
.card:hover{transform:translateY(-3px)}
.card[data-broken]{opacity:.55}
.cover{position:relative;aspect-ratio:16/9;background:var(--ink)}
.cover img{width:100%;height:100%;object-fit:cover;display:block}
.badge{position:absolute;top:10px;left:10px;background:rgba(20,48,74,.85);color:#fff;font-size:12px;font-weight:500;padding:3px 10px;border-radius:6px;backdrop-filter:blur(4px)}
.badge.warn{left:auto;right:10px;background:#B3261E}
.body{padding:16px 18px 18px;display:flex;flex-direction:column;gap:8px;flex:1}
.meta{display:flex;align-items:center;justify-content:space-between}
.cat{font-size:12px;font-weight:700;color:var(--amber-deep);letter-spacing:.08em}
.lv{display:flex;align-items:center;gap:4px}
.lv i{width:8px;height:8px;border-radius:50%;background:var(--line);display:inline-block}
.lv i.on{background:var(--ink)}
.lv b{font-size:11px;font-weight:500;color:var(--ink-soft);margin-left:4px}
h3{font-size:19px;font-weight:700;letter-spacing:-.01em}
.summary{font-size:14px;color:var(--ink-soft)}
.desc{font-size:13px;color:var(--ink-soft)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.chip{font-family:'Space Grotesk';font-size:11.5px;font-weight:500;padding:2px 9px;border:1px solid var(--line);border-radius:6px;color:var(--ink-soft)}
.chip.mod{border-style:dashed}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:auto;padding-top:10px}
.btn{font:inherit;font-size:13.5px;font-weight:700;text-decoration:none;padding:8px 14px;border-radius:9px;border:1.5px solid var(--ink);cursor:pointer;background:var(--card);transition:.15s}
.btn:hover{background:var(--paper)}
.btn.primary{background:var(--ink);color:#fff}
.btn.primary:hover{background:#0d2236}
.btn.qr{border-style:dashed;font-family:'Space Grotesk'}
.tomorrow{margin:12px -18px -18px;padding:10px 18px;background:#FFF6E5;border-top:1px solid #F4DDA8;font-size:13px}
.tomorrow b{color:var(--amber-deep);font-weight:700;margin-right:8px}

dialog{border:none;border-radius:var(--r);padding:28px;box-shadow:var(--shadow);text-align:center}
dialog::backdrop{background:rgba(20,48,74,.45)}
dialog h4{margin-bottom:14px;font-size:16px}
#qrbox{display:inline-block}
dialog .close{margin-top:16px}

footer{text-align:center;color:var(--ink-soft);font-size:13px;padding:0 24px 48px}
footer a{color:var(--amber-deep)}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="eyebrow">Launchdock Lab</div>
  <h1>藍鴨 <em>AI 實例庫</em></h1>
  <p class="sub">課堂上看到的每個 demo 都在這裡:從一句提示詞,到可複製的範本,到全自動工作流。每張卡片最後都有「明天就能做的一件事」。</p>
  <div class="stats">{{COUNT}} demos · updated {{UPDATED}}</div>
</header>

<nav class="filters">
  {{FILTERS}}
  <span class="lv-filter">
    <button class="f on" data-l="*">所有 Level</button>
    <button class="f" data-l="1">L1 提示詞</button>
    <button class="f" data-l="2">L2 範本</button>
    <button class="f" data-l="3">L3 自動化</button>
  </span>
</nav>

<main id="grid">
{{CARDS}}
</main>

<dialog id="qrmodal">
  <h4 id="qrtitle"></h4>
  <div id="qrbox"></div>
  <div><button class="btn close" onclick="qrmodal.close()">關閉</button></div>
</dialog>

<footer>藍鴨 Launchdock · <a href="https://launchdock.app">launchdock.app</a> · 本頁由 projects.yaml 自動建置</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
let cat = "*", lvl = "*";
function apply() {
  document.querySelectorAll("#grid .card").forEach(c => {
    const ok = (cat === "*" || c.dataset.cat === cat) && (lvl === "*" || c.dataset.level === lvl);
    c.style.display = ok ? "" : "none";
  });
}
document.querySelectorAll(".f[data-f]").forEach(b => b.onclick = () => {
  document.querySelectorAll(".f[data-f]").forEach(x => x.classList.remove("on"));
  b.classList.add("on"); cat = b.dataset.f; apply();
});
document.querySelectorAll(".f[data-l]").forEach(b => b.onclick = () => {
  document.querySelectorAll(".f[data-l]").forEach(x => x.classList.remove("on"));
  b.classList.add("on"); lvl = b.dataset.l; apply();
});
const qrmodal = document.getElementById("qrmodal");
document.querySelectorAll(".btn.qr").forEach(b => b.onclick = () => {
  document.getElementById("qrtitle").textContent = b.dataset.title;
  const box = document.getElementById("qrbox");
  box.innerHTML = "";
  new QRCode(box, { text: b.dataset.url, width: 220, height: 220, colorDark: "#14304A" });
  qrmodal.showModal();
});
</script>
</body>
</html>
